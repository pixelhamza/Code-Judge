services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: code_judge
      POSTGRES_USER: code_judge
      POSTGRES_PASSWORD: code_judge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U code_judge -d code_judge"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
